services:
  caddy:
    image: caddy:2.11.2-alpine
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./caddy:/etc/caddy
      - caddy_config:/config
      - caddy_data:/data
      # local dev volumes only
      - ./caddy/certs:/data/caddy/pki/authorities/local

  web:
    image: leagueify-toi-tracker
    build:
      context: ./web
    command: npm run dev
    restart: unless-stopped
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  caddy_config:
  caddy_data:
